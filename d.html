<div class="yt-item">

loading="lazy"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>


</div>

<script>

let observer=new IntersectionObserver(entries=>{

entries.forEach(e=>{

let iframe=e.target.querySelector("iframe");

if(e.isIntersecting){
if(!iframe.src){
iframe.src=iframe.dataset.src;
}
}

});

},{threshold:0.6});

document.querySelectorAll(".yt-item").forEach(el=>{
observer.observe(el);
});

</script>
